<!DOCTYPE html>
<html>

<head>
  <title>CRK Kingdom Builder</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      touch-action: none;
      font-family: sans-serif;
    }

    #topbar {
      height: 60px;
      background: #3b2b1a;
      color: white;
      display: flex;
      align-items: center;
      padding-left: 20px;
      font-weight: bold;
    }

    #gameFrame {
      width: 100%;
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1e1e1e;
    }

    #game {
      background: #87c6ff;
      border: 4px solid black;
      touch-action: none;
      width: 100%;
      height: 100%;
      max-width: 1000px;
      max-height: 600px;
    }

    #toolbar {
      height: 120px;
      background: #2a2a2a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>

  <div id="topbar">CRK Kingdom Planner</div>

  <div id="gameFrame">
    <canvas id="game"></canvas>
  </div>

  <div id="toolbar">Decor items will go here</div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    canvas.width = 1000;
    canvas.height = 600;
    canvas.style.width = "100%";
    canvas.style.height = "100%";

    let cameraX = 0;
    let cameraY = 0;
    let zoom = 1;
    let lastTouchX = 0;
    let lastTouchY = 0;
    let lastDistance = 0;
    let dragging = false;

    const gridWidth = 120;
    const gridHeight = 120;
    const kingdomCenterX = 60;
    const kingdomCenterY = 60;
    const kingdomRadius = 28;

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      if (e.touches.length === 1) {
        dragging = true;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
      if (e.touches.length === 2) {
        dragging = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastDistance = Math.sqrt(dx * dx + dy * dy);
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (e.touches.length === 1 && dragging) {
        const touch = e.touches[0];
        cameraX += touch.clientX - lastTouchX;
        cameraY += touch.clientY - lastTouchY;
        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;
        draw();
      }
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const oldZoom = zoom;
        zoom += (distance - lastDistance) * 0.005;
        zoom = Math.max(0.4, Math.min(3, zoom));
        const zoomRatio = zoom / oldZoom;
        const rect = canvas.getBoundingClientRect();
        const midX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
        const midY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
        const originX = canvas.width / 2 + cameraX;
        const originY = 120 + cameraY;
        const worldX = midX - originX;
        const worldY = midY - originY;
        cameraX -= worldX * (zoomRatio - 1);
        cameraY -= worldY * (zoomRatio - 1);
        lastDistance = distance;
        draw();
      }
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      dragging = false;
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const tileWidth = 64 * zoom;
      const tileHeight = 32 * zoom;
      const originX = canvas.width / 2 + cameraX;
      const originY = 120 + cameraY;
      const visibleRange = 40;
      const startX = Math.floor(-cameraX / 40) - visibleRange;
      const endX = startX + visibleRange * 2;
      const startY = Math.floor(-cameraY / 40) - visibleRange;
      const endY = startY + visibleRange * 2;

      for (let x = startX; x < endX; x++) {
        for (let y = startY; y < endY; y++) {
          if (x < 0 || y < 0 || x >= gridWidth || y >= gridHeight) continue;
          const isoX = originX + (x - y) * tileWidth / 2;
          const isoY = originY + (x + y) * tileHeight / 2;
          const height = 30 * zoom;
          const dx = x - kingdomCenterX;
          const dy = y - kingdomCenterY;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const isKingdom = distance < kingdomRadius;

          // TOP
          ctx.beginPath();
          ctx.moveTo(isoX, isoY);
          ctx.lineTo(isoX + tileWidth / 2, isoY + tileHeight / 2);
          ctx.lineTo(isoX, isoY + tileHeight);
          ctx.lineTo(isoX - tileWidth / 2, isoY + tileHeight / 2);
          ctx.closePath();
          ctx.fillStyle = isKingdom ? "#dcdcdc" : "#4a7a43";
          ctx.fill();
          ctx.stroke();

          // LEFT
          ctx.beginPath();
          ctx.moveTo(isoX - tileWidth / 2, isoY + tileHeight / 2);
          ctx.lineTo(isoX, isoY + tileHeight);
          ctx.lineTo(isoX, isoY + tileHeight + height);
          ctx.lineTo(isoX - tileWidth / 2, isoY + tileHeight / 2 + height);
          ctx.closePath();
          ctx.fillStyle = "#b5b5b5";
          ctx.fill();
          ctx.stroke();

          // RIGHT
          ctx.beginPath();
          ctx.moveTo(isoX + tileWidth / 2, isoY + tileHeight / 2);
          ctx.lineTo(isoX, isoY + tileHeight);
          ctx.lineTo(isoX, isoY + tileHeight + height);
          ctx.lineTo(isoX + tileWidth / 2, isoY + tileHeight / 2 + height);
          ctx.closePath();
          ctx.fillStyle = "#9c9c9c";
          ctx.fill();
          ctx.stroke();
        }
      }
    }

    draw();
  </script>
</body>

</html>
